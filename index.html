<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASICRAFT Build Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div id="game-root" class="w-full h-full"></div>

    <script>
        /**
         * HASI GAME PLATFORM IDENTIFIER
         */
        const __app_id = "hasicraft-build-edition";

        /**
         * 하시크래프트 메인 마운트 함수
         */
        const mountHasiCraft = (container) => {
            // --- 설정 및 상수 ---
            const CHUNK_SIZE = 16;
            const RENDER_DISTANCE = 2;
            const PLAYER_HEIGHT = 1.8;

            // --- 데이터 ---
            const blockData = [
                { id: '🌿', color: 0x55aa55, name: '잔디' },
                { id: '🟫', color: 0x8b4513, name: '흙' },
                { id: '⬛', color: 0x555555, name: '조약돌' },
                { id: '🧱', color: 0xaa4444, name: '붉은 벽돌' },
                { id: '🪵', color: 0x5d4037, name: '참나무' },
                { id: '🍂', color: 0x8d6e63, name: '나무 판자' },
                { id: '💎', color: 0x00ffff, name: '다이아몬드', emissive: 0x002222 },
                { id: '💡', color: 0xffffff, name: '조명', emissive: 0xffffff },
                { id: '🟦', color: 0x4444ff, name: '유리', opacity: 0.6, transparent: true },
                { id: '🌌', color: 0x111111, name: '기반암', isBedrock: true }
            ];

            // --- 상태 관리 ---
            let state = {
                hotbar: [0, 1, 2, 3, 4, 5, 6, 7, 8],
                selectedIdx: 0,
                inventoryOpen: false,
                controlsEnabled: false
            };

            // --- UI 구조 주입 ---
            container.innerHTML = `
                <div id="hasi-game-container" class="relative w-full h-full overflow-hidden font-sans text-white">
                    <div id="render-target" class="w-full h-full"></div>
                    <div id="crosshair" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white pointer-events-none text-2xl font-light" style="display:none">+</div>
                    <div id="debug-info" class="fixed top-4 left-4 text-white text-xs bg-black/50 p-2 rounded pointer-events-none">Initializing...</div>
                    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex space-x-2 p-2 bg-black/40 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl" id="hotbar-container"></div>
                    
                    <div id="inventory-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center z-50" style="display:none">
                        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 max-w-2xl w-full mx-4 shadow-2xl">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-white text-2xl font-black italic tracking-tighter">INVENTORY</h2>
                                <button id="close-inv" class="text-white/50 hover:text-white transition-colors text-xl">✕</button>
                            </div>
                            <div id="inventory-grid" class="grid grid-cols-5 sm:grid-cols-8 gap-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
                            <p class="text-white/40 text-[10px] mt-6 text-center uppercase tracking-widest">Select a slot then click a block to swap (E to Close)</p>
                        </div>
                    </div>

                    <div id="start-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-40 transition-all">
                        <h1 class="text-7xl font-black text-white mb-2 tracking-tighter italic">HASI<span class="text-indigo-400">CRAFT</span></h1>
                        <p class="text-indigo-200/60 mb-10 text-lg uppercase tracking-widest text-center">Infinite Possibilities</p>
                        <button id="btn-start" class="px-14 py-6 bg-indigo-500 hover:bg-indigo-400 text-white rounded-full font-bold text-xl shadow-lg shadow-indigo-500/30 transition-all hover:scale-105 active:scale-95">START ADVENTURE</button>
                        <div class="mt-12 grid grid-cols-3 gap-12 text-white/40 text-[10px] text-center uppercase tracking-widest font-bold">
                            <div><span class="block text-white mb-2 text-sm">WASD</span>Move</div>
                            <div><span class="block text-white mb-2 text-sm">L/R Click</span>Action</div>
                            <div><span class="block text-white mb-2 text-sm">E / 1-9</span>Utility</div>
                        </div>
                    </div>
                </div>
            `;

            const target = container.querySelector('#render-target');
            const hotbarEl = container.querySelector('#hotbar-container');
            const invGridEl = container.querySelector('#inventory-grid');
            const invOverlay = container.querySelector('#inventory-overlay');
            const startOverlay = container.querySelector('#start-overlay');
            const debugEl = container.querySelector('#debug-info');

            let scene, camera, renderer, clock, raycaster, collisionRaycaster;
            let chunks = new Map();
            let allBlocks = new Map();
            let velocity = new THREE.Vector3();
            let moveState = { f: false, b: false, l: false, r: false, jump: false, canJump: false };
            
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const blockMaterials = blockData.map(d => new THREE.MeshStandardMaterial({ 
                color: d.color, 
                emissive: d.emissive || 0x000000,
                transparent: d.transparent || false,
                opacity: d.opacity || 1.0
            }));

            const renderHotbar = () => {
                hotbarEl.innerHTML = state.hotbar.map((idx, i) => `
                    <div class="hotbar-slot w-12 h-12 sm:w-14 sm:h-14 flex flex-col items-center justify-center rounded-xl transition-all border-2 cursor-pointer
                        ${i === state.selectedIdx ? 'bg-indigo-500/40 border-indigo-400 shadow-[0_0_15px_rgba(129,140,248,0.5)]' : 'bg-white/5 border-transparent hover:bg-white/10'}"
                        data-slot-idx="${i}">
                        <span class="text-2xl">${blockData[idx].id}</span>
                        <span class="text-[9px] text-white/50 font-bold">${i + 1}</span>
                    </div>
                `).join('');
                
                hotbarEl.querySelectorAll('.hotbar-slot').forEach(el => {
                    el.onclick = () => {
                        state.selectedIdx = parseInt(el.dataset.slotIdx);
                        renderHotbar();
                    };
                });
            };

            const renderInventory = () => {
                invGridEl.innerHTML = blockData.map((b, i) => b.isBedrock ? '' : `
                    <div class="flex flex-col items-center p-3 bg-white/5 hover:bg-indigo-500/20 rounded-2xl cursor-pointer border border-white/5 transition-all active:scale-95" data-item-idx="${i}">
                        <span class="text-3xl mb-1">${b.id}</span>
                        <span class="text-[10px] text-white/60 text-center leading-tight font-medium">${b.name}</span>
                    </div>
                `).join('');
            };

            const initEngine = () => {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                scene.fog = new THREE.Fog(0x87ceeb, 20, 70);

                camera = new THREE.PerspectiveCamera(75, target.clientWidth / target.clientHeight, 0.1, 1000);
                camera.position.set(0, 35, 0);
                camera.rotation.order = 'YXZ';

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(target.clientWidth, target.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                target.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const sun = new THREE.DirectionalLight(0xffffff, 0.5);
                sun.position.set(20, 60, 20);
                scene.add(sun);

                raycaster = new THREE.Raycaster();
                collisionRaycaster = new THREE.Raycaster();
                clock = new THREE.Clock();
            };

            const getHeight = (x, z) => Math.floor(18 + Math.sin(x * 0.12) * 4 + Math.cos(z * 0.12) * 4);

            const createChunk = (cX, cZ) => {
                const key = `${cX},${cZ}`;
                const blocks = [];
                for(let x=0; x<CHUNK_SIZE; x++){
                    for(let z=0; z<CHUNK_SIZE; z++){
                        const wx = cX * CHUNK_SIZE + x, wz = cZ * CHUNK_SIZE + z;
                        const h = getHeight(wx, wz);
                        for(let y=0; y<=h; y++){
                            let typeIdx = (y === h) ? 0 : (y > h-3 ? 1 : 2);
                            if (y === 0) typeIdx = blockData.length - 1;
                            blocks.push({x:wx, y, z:wz, typeIdx});
                            allBlocks.set(`${wx},${y},${wz}`, typeIdx);
                        }
                    }
                }
                const chunk = { cX, cZ, blocks, instancedMeshes: [] };
                chunks.set(key, chunk);
                updateChunkMesh(chunk);
            };

            const updateChunkMesh = (chunk) => {
                chunk.instancedMeshes.forEach(m => scene.remove(m));
                chunk.instancedMeshes = [];
                const groups = blockData.map(() => []);
                chunk.blocks.forEach(b => {
                    const exposed = !allBlocks.has(`${b.x+1},${b.y},${b.z}`) || !allBlocks.has(`${b.x-1},${b.y},${b.z}`) ||
                                  !allBlocks.has(`${b.x},${b.y+1},${b.z}`) || !allBlocks.has(`${b.x},${b.y-1},${b.z}`) ||
                                  !allBlocks.has(`${b.x},${b.y},${b.z+1}`) || !allBlocks.has(`${b.x},${b.y},${b.z-1}`);
                    if(exposed) groups[b.typeIdx].push(b);
                });
                groups.forEach((g, i) => {
                    if(g.length === 0) return;
                    const im = new THREE.InstancedMesh(boxGeo, blockMaterials[i], g.length);
                    const dummy = new THREE.Object3D();
                    g.forEach((b, idx) => { 
                        dummy.position.set(b.x, b.y, b.z); 
                        dummy.updateMatrix(); 
                        im.setMatrixAt(idx, dummy.matrix); 
                    });
                    im.userData = { chunkKey: `${chunk.cX},${chunk.cZ}`, typeIdx: i };
                    scene.add(im);
                    chunk.instancedMeshes.push(im);
                });
            };

            const toggleInventory = (open) => {
                state.inventoryOpen = open;
                invOverlay.style.display = open ? 'flex' : 'none';
                if (open) document.exitPointerLock();
                else container.requestPointerLock();
            };

            const animate = () => {
                requestAnimationFrame(animate);
                const delta = Math.min(clock.getDelta(), 0.1);
                
                if (state.controlsEnabled && !state.inventoryOpen) {
                    velocity.x -= velocity.x * 10 * delta;
                    velocity.z -= velocity.z * 10 * delta;
                    velocity.y -= 25 * delta;

                    const dir = new THREE.Vector3(Number(moveState.r)-Number(moveState.l), 0, Number(moveState.f)-Number(moveState.b)).normalize();
                    const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir); camDir.y = 0; camDir.normalize();
                    const camRight = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();
                    
                    if (moveState.f || moveState.b) velocity.add(camDir.multiplyScalar(dir.z * 55 * delta));
                    if (moveState.l || moveState.r) velocity.add(camRight.multiplyScalar(-dir.x * 55 * delta));

                    camera.position.add(velocity.clone().multiplyScalar(delta));

                    collisionRaycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
                    const allIM = []; chunks.forEach(c => allIM.push(...c.instancedMeshes));
                    const intersect = collisionRaycaster.intersectObjects(allIM);
                    const floorY = intersect.length > 0 ? intersect[0].point.y + PLAYER_HEIGHT : 2;
                    
                    if (camera.position.y <= floorY) {
                        camera.position.y = floorY; 
                        velocity.y = 0; 
                        moveState.canJump = true;
                    }

                    if (camera.position.y < -5) { camera.position.set(0, 40, 0); velocity.set(0,0,0); }
                    debugEl.textContent = `XYZ: ${camera.position.x.toFixed(0)}, ${camera.position.y.toFixed(0)}, ${camera.position.z.toFixed(0)}`;
                }
                renderer.render(scene, camera);
            };

            const bindEvents = () => {
                container.querySelector('#btn-start').onclick = () => container.requestPointerLock();
                container.querySelector('#close-inv').onclick = () => toggleInventory(false);

                document.addEventListener('pointerlockchange', () => {
                    const locked = document.pointerLockElement === container;
                    state.controlsEnabled = locked;
                    startOverlay.style.display = (locked || state.inventoryOpen) ? 'none' : 'flex';
                    container.querySelector('#crosshair').style.display = locked ? 'block' : 'none';
                });

                container.addEventListener('mousemove', (e) => {
                    if (!state.controlsEnabled) return;
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
                });

                window.addEventListener('keydown', (e) => {
                    if (e.code === 'KeyE') toggleInventory(!state.inventoryOpen);
                    if (state.inventoryOpen) return;
                    if (e.code === 'KeyW') moveState.f = true;
                    if (e.code === 'KeyS') moveState.b = true;
                    if (e.code === 'KeyA') moveState.l = true;
                    if (e.code === 'KeyD') moveState.r = true;
                    if (e.code === 'Space' && moveState.canJump) { velocity.y = 9.5; moveState.canJump = false; }
                    if (e.key >= '1' && e.key <= '9') { state.selectedIdx = parseInt(e.key)-1; renderHotbar(); }
                });

                window.addEventListener('keyup', (e) => {
                    if (e.code === 'KeyW') moveState.f = false;
                    if (e.code === 'KeyS') moveState.b = false;
                    if (e.code === 'KeyA') moveState.l = false;
                    if (e.code === 'KeyD') moveState.r = false;
                });

                invGridEl.addEventListener('click', (e) => {
                    const item = e.target.closest('[data-item-idx]');
                    if (item) {
                        state.hotbar[state.selectedIdx] = parseInt(item.dataset.itemIdx);
                        renderHotbar();
                    }
                });

                container.addEventListener('mousedown', (e) => {
                    if (!state.controlsEnabled) return;
                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                    const allIM = []; chunks.forEach(c => allIM.push(...c.instancedMeshes));
                    const hits = raycaster.intersectObjects(allIM);
                    
                    if (hits.length > 0 && hits[0].distance < 7) {
                        const hit = hits[0];
                        const matrix = new THREE.Matrix4(); hit.object.getMatrixAt(hit.instanceId, matrix);
                        const pos = new THREE.Vector3().setFromMatrixPosition(matrix);
                        const px = Math.round(pos.x), py = Math.round(pos.y), pz = Math.round(pos.z);

                        if (e.button === 0) { // 삭제
                            if (blockData[hit.object.userData.typeIdx].isBedrock) return;
                            const chunk = chunks.get(hit.object.userData.chunkKey);
                            chunk.blocks = chunk.blocks.filter(b => !(b.x === px && b.y === py && b.z === pz));
                            allBlocks.delete(`${px},${py},${pz}`);
                            updateChunkMesh(chunk);
                        } else if (e.button === 2) { // 설치
                            const n = hit.face.normal;
                            const nx = px + n.x, ny = py + n.y, nz = pz + n.z;
                            const cX = Math.floor(nx/CHUNK_SIZE), cZ = Math.floor(nz/CHUNK_SIZE);
                            const chunk = chunks.get(`${cX},${cZ}`);
                            if (chunk && !allBlocks.has(`${nx},${ny},${nz}`)) {
                                const typeIdx = state.hotbar[state.selectedIdx];
                                chunk.blocks.push({x:nx, y:ny, z:nz, typeIdx});
                                allBlocks.set(`${nx},${ny},${nz}`, typeIdx);
                                updateChunkMesh(chunk);
                            }
                        }
                    }
                });
                
                // 마우스 우클릭 메뉴 방지
                container.addEventListener('contextmenu', e => e.preventDefault());
            };

            renderHotbar();
            renderInventory();
            initEngine();
            bindEvents();
            
            for(let x=-RENDER_DISTANCE; x<=RENDER_DISTANCE; x++) {
                for(let z=-RENDER_DISTANCE; z<=RENDER_DISTANCE; z++) createChunk(x, z);
            }
            
            animate();

            window.addEventListener('resize', () => {
                if(!renderer) return;
                camera.aspect = target.clientWidth / target.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(target.clientWidth, target.clientHeight);
            });

            return () => {
                renderer.dispose();
                target.innerHTML = '';
            };
        };

        // 즉시 실행
        const root = document.getElementById('game-root');
        mountHasiCraft(root);
    </script>
</body>
</html>
