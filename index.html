<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASICRAFT Infinite World</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <div id="game-root" class="w-full h-full"></div>

    <script>
        const __app_id = "hasicraft-infinite-edition";

        const mountHasiCraft = (container) => {
            // --- 설정 ---
            const CHUNK_SIZE = 16;
            const RENDER_DISTANCE = 2; // 플레이어 중심 반경 (2청크 제한)
            const PLAYER_HEIGHT = 1.7;
            const PLAYER_EYE_LEVEL = 1.5;
            const PLAYER_REACH = 6;

            const blockData = [
                { id: '🌿', color: 0x55aa55, name: '잔디' },
                { id: '🟫', color: 0x8b4513, name: '흙' },
                { id: '⬛', color: 0x555555, name: '조약돌' },
                { id: '🧱', color: 0xaa4444, name: '붉은 벽돌' },
                { id: '🪵', color: 0x5d4037, name: '참나무' },
                { id: '🍂', color: 0x8d6e63, name: '나무 판자' },
                { id: '💎', color: 0x00ffff, name: '다이아몬드', emissive: 0x002222 },
                { id: '💡', color: 0xffffff, name: '조명', emissive: 0xffffff },
                { id: '🟦', color: 0x4444ff, name: '유리', opacity: 0.6, transparent: true },
                { id: '🌌', color: 0x111111, name: '기반암', isBedrock: true }
            ];

            let state = {
                hotbar: [0, 1, 2, 3, 4, 5, 6, 7, 8],
                selectedIdx: 0,
                inventoryOpen: false,
                controlsEnabled: false
            };

            container.innerHTML = `
                <div id="hasi-game-root" class="relative w-full h-full overflow-hidden bg-sky-400 font-sans text-white">
                    <div id="render-target" class="w-full h-full"></div>
                    <div id="crosshair" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white pointer-events-none text-2xl font-light opacity-50" style="display:none">+</div>
                    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex space-x-2 p-2 bg-black/40 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl" id="hotbar-container"></div>
                    <div id="inventory-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center z-50" style="display:none">
                        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 max-w-2xl w-full mx-4 shadow-2xl">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-white text-2xl font-black italic">INVENTORY</h2>
                                <button id="close-inv" class="text-white/50 hover:text-white transition-colors">✕</button>
                            </div>
                            <div id="inventory-grid" class="grid grid-cols-5 sm:grid-cols-8 gap-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll"></div>
                        </div>
                    </div>
                    <div id="start-overlay" class="fixed inset-0 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-sm z-40">
                        <h1 class="text-6xl font-black text-white mb-2 italic">HASI<span class="text-indigo-400">CRAFT</span></h1>
                        <p class="text-indigo-200/50 mb-10 text-sm tracking-widest">INFINITE WORLD EDITION</p>
                        <button id="btn-start" class="px-12 py-5 bg-indigo-500 hover:bg-indigo-400 text-white rounded-full font-bold text-xl shadow-lg transition-all active:scale-95">시작하기</button>
                    </div>
                </div>
            `;

            const target = container.querySelector('#render-target');
            const hotbarEl = container.querySelector('#hotbar-container');
            const invGridEl = container.querySelector('#inventory-grid');
            const invOverlay = container.querySelector('#inventory-overlay');
            const startOverlay = container.querySelector('#start-overlay');

            let scene, camera, renderer, clock, raycaster;
            let chunks = new Map();
            let allBlocks = new Map();
            let velocity = new THREE.Vector3();
            let moveState = { f: false, b: false, l: false, r: false, jump: false, canJump: false };
            let lastPlayerChunk = { x: NaN, z: NaN };

            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const blockMaterials = blockData.map(d => new THREE.MeshStandardMaterial({
                color: d.color,
                emissive: d.emissive || 0x000000,
                transparent: d.transparent || false,
                opacity: d.opacity || 1.0
            }));

            const initEngine = () => {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                scene.fog = new THREE.Fog(0x87ceeb, 10, 50); // 무한 맵 느낌을 위해 안개 조절

                camera = new THREE.PerspectiveCamera(75, target.clientWidth / target.clientHeight, 0.1, 1000);
                camera.position.set(8, 30, 8);
                camera.rotation.order = 'YXZ';

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(target.clientWidth, target.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                target.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const sun = new THREE.DirectionalLight(0xffffff, 0.6);
                sun.position.set(10, 50, 10);
                scene.add(sun);

                raycaster = new THREE.Raycaster();
                clock = new THREE.Clock();
            };

            const isBlockAt = (x, y, z) => allBlocks.has(`${Math.round(x)},${Math.round(y)},${Math.round(z)}`);

            const checkCollision = (pos) => {
                const checkOffsets = [{ x: 0, y: -PLAYER_EYE_LEVEL, z: 0 }, { x: 0, y: -PLAYER_EYE_LEVEL * 0.5, z: 0 }, { x: 0, y: 0.1, z: 0 }];
                const radius = 0.3;
                for (let offset of checkOffsets) {
                    const cx = pos.x + offset.x, cy = pos.y + offset.y, cz = pos.z + offset.z;
                    if (isBlockAt(cx + radius, cy, cz) || isBlockAt(cx - radius, cy, cz) ||
                        isBlockAt(cx, cy, cz + radius) || isBlockAt(cx, cy, cz - radius) || isBlockAt(cx, cy, cz)) return true;
                }
                return false;
            };

            // 간단한 노이즈 함수 대용 (무한 지형 생성을 위한 결정론적 함수)
            const getPseudoNoiseHeight = (x, z) => {
                return Math.floor(12 + Math.sin(x * 0.15) * 4 + Math.cos(z * 0.12) * 4 + Math.sin(x * 0.05 + z * 0.05) * 2);
            };

            const createChunk = (cX, cZ) => {
                const key = `${cX},${cZ}`;
                if (chunks.has(key)) return;

                const blocks = [];
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const wx = cX * CHUNK_SIZE + x, wz = cZ * CHUNK_SIZE + z;
                        const h = getPseudoNoiseHeight(wx, wz);
                        for (let y = 0; y <= h; y++) {
                            let typeIdx = (y === h) ? 0 : (y > h - 3 ? 1 : 2);
                            if (y === 0) typeIdx = blockData.length - 1;
                            blocks.push({ x: wx, y, z: wz, typeIdx });
                            allBlocks.set(`${wx},${y},${wz}`, typeIdx);
                        }
                    }
                }
                const chunk = { cX, cZ, blocks, instancedMeshes: [] };
                chunks.set(key, chunk);
                updateChunkMesh(chunk);
            };

            const removeChunk = (key) => {
                const chunk = chunks.get(key);
                if (!chunk) return;
                chunk.instancedMeshes.forEach(m => scene.remove(m));
                chunk.blocks.forEach(b => allBlocks.delete(`${b.x},${b.y},${b.z}`));
                chunks.delete(key);
            };

            const updateChunkMesh = (chunk) => {
                chunk.instancedMeshes.forEach(m => scene.remove(m));
                chunk.instancedMeshes = [];
                const groups = blockData.map(() => []);
                chunk.blocks.forEach(b => {
                    const exposed = !allBlocks.has(`${b.x+1},${b.y},${b.z}`) || !allBlocks.has(`${b.x-1},${b.y},${b.z}`) ||
                                   !allBlocks.has(`${b.x},${b.y+1},${b.z}`) || !allBlocks.has(`${b.x},${b.y-1},${b.z}`) ||
                                   !allBlocks.has(`${b.x},${b.y},${b.z+1}`) || !allBlocks.has(`${b.x},${b.y},${b.z-1}`);
                    if (exposed) groups[b.typeIdx].push(b);
                });
                groups.forEach((g, i) => {
                    if (g.length === 0) return;
                    const im = new THREE.InstancedMesh(boxGeo, blockMaterials[i], g.length);
                    const dummy = new THREE.Object3D();
                    g.forEach((b, idx) => {
                        dummy.position.set(b.x, b.y, b.z); dummy.updateMatrix();
                        im.setMatrixAt(idx, dummy.matrix);
                    });
                    im.userData = { chunkKey: `${chunk.cX},${chunk.cZ}`, typeIdx: i };
                    scene.add(im);
                    chunk.instancedMeshes.push(im);
                });
            };

            // 청크 업데이트 로직 (무한 맵의 핵심)
            const updateInfiniteWorld = () => {
                const pCX = Math.floor(camera.position.x / CHUNK_SIZE);
                const pCZ = Math.floor(camera.position.z / CHUNK_SIZE);

                if (pCX !== lastPlayerChunk.x || pCZ !== lastPlayerChunk.z) {
                    lastPlayerChunk = { x: pCX, z: pCZ };

                    const activeKeys = new Set();
                    // 현재 플레이어 주변 RENDER_DISTANCE 내 청크 생성
                    for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                            const cX = pCX + x, cZ = pCZ + z;
                            const key = `${cX},${cZ}`;
                            activeKeys.add(key);
                            if (!chunks.has(key)) createChunk(cX, cZ);
                        }
                    }

                    // 멀리 떨어진 청크 제거
                    for (const key of chunks.keys()) {
                        if (!activeKeys.has(key)) removeChunk(key);
                    }
                }
            };

            const animate = () => {
                requestAnimationFrame(animate);
                const delta = Math.min(clock.getDelta(), 0.1);

                if (state.controlsEnabled && !state.inventoryOpen) {
                    velocity.x -= velocity.x * 10 * delta;
                    velocity.z -= velocity.z * 10 * delta;
                    velocity.y -= 25 * delta;

                    const camDir = new THREE.Vector3();
                    camera.getWorldDirection(camDir);
                    camDir.y = 0; camDir.normalize();
                    const camRight = new THREE.Vector3().crossVectors(camera.up, camDir).normalize();

                    const moveDir = new THREE.Vector3();
                    if (moveState.f) moveDir.add(camDir);
                    if (moveState.b) moveDir.sub(camDir);
                    if (moveState.l) moveDir.add(camRight);
                    if (moveState.r) moveDir.sub(camRight);
                    moveDir.normalize();

                    velocity.x += moveDir.x * 50 * delta;
                    velocity.z += moveDir.z * 50 * delta;

                    const nextPos = camera.position.clone();
                    nextPos.x += velocity.x * delta;
                    if (checkCollision(nextPos)) { nextPos.x = camera.position.x; velocity.x = 0; }
                    nextPos.z += velocity.z * delta;
                    if (checkCollision(nextPos)) { nextPos.z = camera.position.z; velocity.z = 0; }
                    nextPos.y += velocity.y * delta;
                    
                    const footY = nextPos.y - PLAYER_EYE_LEVEL;
                    const gridX = Math.round(nextPos.x), gridZ = Math.round(nextPos.z);
                    if (isBlockAt(gridX, Math.round(footY), gridZ) || isBlockAt(gridX, Math.floor(footY), gridZ)) {
                        nextPos.y = Math.floor(footY) + 1 + PLAYER_EYE_LEVEL;
                        velocity.y = 0; moveState.canJump = true;
                    } else {
                        moveState.canJump = false;
                    }

                    camera.position.copy(nextPos);
                    updateInfiniteWorld(); // 무한 맵 업데이트
                }
                renderer.render(scene, camera);
            };

            const renderHotbar = () => {
                hotbarEl.innerHTML = state.hotbar.map((idx, i) => `
                    <div class="w-12 h-12 flex flex-col items-center justify-center rounded-xl border-2 
                        ${i === state.selectedIdx ? 'bg-indigo-500/40 border-indigo-400' : 'bg-white/5 border-transparent'}"
                        data-idx="${i}">
                        <span class="text-2xl">${blockData[idx].id}</span>
                    </div>
                `).join('');
            };

            const renderInventory = () => {
                invGridEl.innerHTML = blockData.map((b, i) => b.isBedrock ? '' : `
                    <div class="flex flex-col items-center p-3 bg-white/5 hover:bg-indigo-500/20 rounded-2xl cursor-pointer border border-white/5" data-item-idx="${i}">
                        <span class="text-3xl mb-1">${b.id}</span>
                        <span class="text-[9px] text-white/40 uppercase">${b.name}</span>
                    </div>
                `).join('');
            };

            const bindEvents = () => {
                container.querySelector('#btn-start').onclick = () => container.requestPointerLock();
                container.querySelector('#close-inv').onclick = () => {
                    state.inventoryOpen = false;
                    invOverlay.style.display = 'none';
                    container.requestPointerLock();
                };
                document.addEventListener('pointerlockchange', () => {
                    const locked = document.pointerLockElement === container;
                    state.controlsEnabled = locked;
                    startOverlay.style.display = (locked || state.inventoryOpen) ? 'none' : 'flex';
                    container.querySelector('#crosshair').style.display = locked ? 'block' : 'none';
                });
                container.addEventListener('mousemove', (e) => {
                    if (!state.controlsEnabled) return;
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * 0.002));
                });
                window.addEventListener('keydown', (e) => {
                    if (e.code === 'KeyE') {
                        state.inventoryOpen = !state.inventoryOpen;
                        invOverlay.style.display = state.inventoryOpen ? 'flex' : 'none';
                        if (state.inventoryOpen) document.exitPointerLock();
                        else container.requestPointerLock();
                    }
                    if (state.inventoryOpen) return;
                    if (e.code === 'KeyW') moveState.f = true;
                    if (e.code === 'KeyS') moveState.b = true;
                    if (e.code === 'KeyA') moveState.l = true;
                    if (e.code === 'KeyD') moveState.r = true;
                    if (e.code === 'Space' && moveState.canJump) { velocity.y = 8; moveState.canJump = false; }
                    if (e.key >= '1' && e.key <= '9') { state.selectedIdx = parseInt(e.key) - 1; renderHotbar(); }
                });
                window.addEventListener('keyup', (e) => {
                    if (e.code === 'KeyW') moveState.f = false;
                    if (e.code === 'KeyS') moveState.b = false;
                    if (e.code === 'KeyA') moveState.l = false;
                    if (e.code === 'KeyD') moveState.r = false;
                });
                invGridEl.onclick = (e) => {
                    const item = e.target.closest('[data-item-idx]');
                    if (item) { state.hotbar[state.selectedIdx] = parseInt(item.dataset.itemIdx); renderHotbar(); }
                };
                container.onmousedown = (e) => {
                    if (!state.controlsEnabled) return;
                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                    const allIM = []; chunks.forEach(c => allIM.push(...c.instancedMeshes));
                    const hits = raycaster.intersectObjects(allIM);
                    if (hits.length > 0 && hits[0].distance < PLAYER_REACH) {
                        const hit = hits[0];
                        const matrix = new THREE.Matrix4();
                        hit.object.getMatrixAt(hit.instanceId, matrix);
                        const pos = new THREE.Vector3().setFromMatrixPosition(matrix);
                        const px = Math.round(pos.x), py = Math.round(pos.y), pz = Math.round(pos.z);
                        if (e.button === 0) {
                            if (blockData[hit.object.userData.typeIdx].isBedrock) return;
                            const chunk = chunks.get(hit.object.userData.chunkKey);
                            chunk.blocks = chunk.blocks.filter(b => !(b.x === px && b.y === py && b.z === pz));
                            allBlocks.delete(`${px},${py},${pz}`); updateChunkMesh(chunk);
                        } else if (e.button === 2) {
                            const n = hit.face.normal;
                            const nx = px + n.x, ny = py + n.y, nz = pz + n.z;
                            const cX = Math.floor(nx / CHUNK_SIZE), cZ = Math.floor(nz / CHUNK_SIZE);
                            const chunk = chunks.get(`${cX},${cZ}`);
                            if (chunk && !allBlocks.has(`${nx},${ny},${nz}`)) {
                                const typeIdx = state.hotbar[state.selectedIdx];
                                chunk.blocks.push({ x: nx, y: ny, z: nz, typeIdx });
                                allBlocks.set(`${nx},${ny},${nz}`, typeIdx); updateChunkMesh(chunk);
                            }
                        }
                    }
                };
                container.oncontextmenu = (e) => e.preventDefault();
            };

            initEngine();
            renderHotbar();
            renderInventory();
            bindEvents();
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = target.clientWidth / target.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(target.clientWidth, target.clientHeight);
            });

            return () => { renderer.dispose(); container.innerHTML = ''; };
        };

        window.onload = () => {
            const root = document.getElementById('game-root');
            mountHasiCraft(root);
        };
    </script>
</body>
</html>
